name: Publish images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: publish-${{ matrix.image.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - name: backend
            context: src/backend
            dockerfile: src/backend/Dockerfile
          - name: frontend
            context: src/frontend
            dockerfile: src/frontend/Dockerfile
          - name: coraza
            context: .
            dockerfile: docker/coraza.Dockerfile
          - name: log-shipper
            context: src/log-shipper
            dockerfile: src/log-shipper/Dockerfile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/guard-proxy-${{ matrix.image.name }}
          tags: |
            type=ref,event=tag
            type=raw,value=alpha,enable=${{ !contains(github.ref, '-beta.') }}
            type=raw,value=beta,enable=${{ contains(github.ref, '-beta.') }}
            type=sha,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}

  release-kit:
    name: release-kit
    needs: publish
    if: contains(github.ref, '-beta.')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Derive release tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build release-kit archive
        run: |
          mkdir -p dist
          tar -czf "dist/guard-proxy-release-${{ steps.tag.outputs.tag }}.tar.gz" \
            -C release .

      - name: Create GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          prerelease: true
          files: dist/guard-proxy-release-${{ steps.tag.outputs.tag }}.tar.gz
          generate_release_notes: true
